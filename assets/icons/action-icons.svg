<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Add Icon -->
  <g id="add">
    <circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="35" y1="50" x2="65" y2="50" stroke="currentColor" stroke-width="2"/>
    <line x1="50" y1="35" x2="50" y2="65" stroke="currentColor" stroke-width="2"/>
  </g>
  
  <!-- Edit Icon -->
  <g id="edit">
    <path d="M25 75 L35 65 L65 35 L75 45 L45 75 L25 75" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M60 40 L70 50" fill="none" stroke="currentColor" stroke-width="2"/>
  </g>
  
  <!-- Delete Icon -->
  <g id="delete">
    <rect x="30" y="25" width="40" height="45" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="25" y1="25" x2="75" y2="25" stroke="currentColor" stroke-width="2"/>
    <line x1="40" y1="15" x2="60" y2="15" stroke="currentColor" stroke-width="2"/>
    <line x1="45" y1="40" x2="45" y2="60" stroke="currentColor" stroke-width="2"/>
    <line x1="55" y1="40" x2="55" y2="60" stroke="currentColor" stroke-width="2"/>
  </g>
</svg>
