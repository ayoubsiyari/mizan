<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dashboard Icon -->
  <g id="dashboard">
    <rect x="10" y="10" width="35" height="35" rx="5" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="55" y="10" width="35" height="35" rx="5" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="10" y="55" width="35" height="35" rx="5" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="55" y="55" width="35" height="35" rx="5" fill="none" stroke="currentColor" stroke-width="2"/>
  </g>
  
  <!-- Clients Icon -->
  <g id="clients">
    <circle cx="30" cy="25" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M15 50 Q15 40 30 40 Q45 40 45 50" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="70" cy="25" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M55 50 Q55 40 70 40 Q85 40 85 50" fill="none" stroke="currentColor" stroke-width="2"/>
  </g>
  
  <!-- Cases Icon -->
