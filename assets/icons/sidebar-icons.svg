    <line x1="25" y1="30" x2="75" y2="30" stroke="currentColor" stroke-width="2"/>
    <line x1="25" y1="40" x2="75" y2="40" stroke="currentColor" stroke-width="2"/>
    <line x1="25" y1="50" x2="60" y2="50" stroke="currentColor" stroke-width="2"/>
