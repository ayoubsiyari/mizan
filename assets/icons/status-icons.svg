<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Active Status -->
  <g id="active">
    <circle cx="50" cy="50" r="15" fill="#4CAF50"/>
    <circle cx="50" cy="50" r="10" fill="white"/>
  </g>
  
  <!-- Pending Status -->
  <g id="pending">
    <circle cx="50" cy="50" r="15" fill="#FF9800"/>
    <circle cx="50" cy="50" r="10" fill="white"/>
  </g>
  
  <!-- Closed Status -->
  <g id="closed">
    <circle cx="50" cy="50" r="15" fill="#F44336"/>
    <circle cx="50" cy="50" r="10" fill="white"/>
  </g>
  
  <!-- Completed Status -->
  <g id="completed">
    <path d="M35 50 L45 60 L65 40" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
