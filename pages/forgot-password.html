<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استعادة كلمة المرور - ميزان</title>
  <link rel="stylesheet" href="../css/app-shell.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 20px; background: linear-gradient(135deg, var(--brand), var(--brand-hover)); }
    .auth-card { background: #fff; padding: 36px; border-radius: 14px; width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .auth-card h1 { color: var(--brand); margin: 0 0 10px; }
    .auth-card .link { color: var(--brand); text-decoration: underline; }
    .msg { padding: 10px 14px; border-radius: 8px; margin: 10px 0; display: none; }
    .msg.show { display: block; }
    .msg.ok { background: #d1fae5; color: #065f46; }
    .msg.err { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1>استعادة كلمة المرور</h1>
    <p style="color:var(--muted)">أدخل بريدك الإلكتروني وسنرسل رابط إعادة التعيين.</p>
    <div class="msg ok" id="ok"></div>
    <div class="msg err" id="err"></div>
    <form id="f" class="form-grid">
      <div class="form-field full"><label>البريد الإلكتروني *</label><input name="email" type="email" required></div>
      <div class="form-field full"><button class="btn btn-primary" type="submit" style="width:100%;padding:12px">إرسال الرابط</button></div>
    </form>
    <p style="text-align:center;margin-top:16px"><a href="login.html" class="link">العودة إلى تسجيل الدخول</a></p>
  </div>
  <script>
    const form = document.getElementById('f');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      document.querySelectorAll('.msg').forEach(m => m.classList.remove('show'));
      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: form.email.value })
        });
        const body = await res.json();
        const ok = document.getElementById('ok');
        if (body.data && body.data.resetToken) {
          ok.innerHTML = `تم إنشاء رابط الاستعادة (وضع التطوير): <a href="reset-password.html?token=${body.data.resetToken}">اضغط هنا</a>`;
        } else {
          ok.textContent = 'إذا كان البريد مسجلاً فسيتم إرسال رابط الاستعادة.';
        }
        ok.classList.add('show');
      } catch (err) {
        document.getElementById('err').textContent = 'تعذر الاتصال بالخادم';
        document.getElementById('err').classList.add('show');
      }
    });
  </script>
</body>
</html>
