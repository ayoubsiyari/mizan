<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - ميزان</title>
  <link rel="stylesheet" href="../css/app-shell.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 20px; background: linear-gradient(135deg, var(--brand), var(--brand-hover)); }
    .auth-card { background: #fff; padding: 40px; border-radius: 14px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .auth-card h1 { color: var(--brand); margin: 0 0 6px; }
    .auth-card .sub { color: var(--muted); margin: 0 0 20px; }
    .auth-card .link { color: var(--brand); text-decoration: underline; }
    .err { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; display: none; }
    .err.show { display: block; }
    .logo { text-align: center; margin-bottom: 12px; font-size: 2rem; color: var(--brand); font-weight: 700; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo">⚖️ ميزان</div>
    <h1>مرحباً بعودتك</h1>
    <p class="sub">سجل دخولك لإدارة مكتبك القانوني</p>
    <div class="err" id="err"></div>
    <form id="f" class="form-grid">
      <div class="form-field full"><label>البريد الإلكتروني</label><input name="email" type="email" required></div>
      <div class="form-field full"><label>كلمة المرور</label><input name="password" type="password" required minlength="6"></div>
      <div class="form-field full"><button class="btn btn-primary" type="submit" style="width:100%;padding:12px">تسجيل الدخول</button></div>
    </form>
    <p style="text-align:center;margin-top:14px;font-size:.9rem"><a href="forgot-password.html" class="link">نسيت كلمة المرور؟</a></p>
    <p style="text-align:center;margin-top:4px">ليس لديك حساب؟ <a href="register.html" class="link">إنشاء حساب جديد</a></p>
  </div>
  <script>
    const form = document.getElementById('f');
    const err = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.remove('show');
      const btn = form.querySelector('button');
      btn.disabled = true; const orig = btn.textContent; btn.textContent = 'جارٍ التحقق...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: form.email.value, password: form.password.value })
        });
        const body = await res.json();
        if (!res.ok || !body.success) { err.textContent = body.error || 'فشل تسجيل الدخول'; err.classList.add('show'); return; }
        localStorage.setItem('authToken', body.data.token);
        localStorage.setItem('user', JSON.stringify(body.data.user));
        location.href = 'dashboard.html';
      } catch {
        err.textContent = 'تعذر الاتصال بالخادم'; err.classList.add('show');
      } finally {
        btn.disabled = false; btn.textContent = orig;
      }
    });
  </script>
</body>
</html>
