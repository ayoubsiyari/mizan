<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الساعات المدفوعة - ميزان</title>
  <link rel="stylesheet" href="../css/app-shell.css">
  <style>
    .timer-card { background: linear-gradient(135deg, var(--brand), var(--brand-hover)); color: #fff; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
    .timer-card .clock { font-family: 'Courier New', monospace; font-size: 2.2rem; font-weight: 700; letter-spacing: 2px; min-width: 160px; }
    .timer-card .desc { flex: 1; color: rgba(255,255,255,0.9); font-size: .95rem; min-width: 200px; }
    .timer-card .actions { display: flex; gap: 8px; }
    .timer-card input, .timer-card select { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 12px; border-radius: 8px; font: inherit; }
    .timer-card input::placeholder { color: rgba(255,255,255,0.6); }
    .timer-card .start-form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; flex: 1; }
    @media (max-width: 700px) { .timer-card .start-form { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <script src="../js/app-shell.js"></script>
  <script src="../js/crud-page.js"></script>
  <script>
    function fmtDur(mins) {
      mins = mins || 0;
      const h = Math.floor(mins / 60), m = mins % 60;
      return `${h}س ${m}د`;
    }

    AppShell.mount({
      page: 'time',
      title: 'الساعات المدفوعة',
      render: async (root, ctx) => {
        root.innerHTML = `
          <div class="page-header"><h2 class="page-title">تتبع الساعات المدفوعة</h2></div>
          <div id="timerCard"></div>
          <div id="crudHost"></div>`;

        async function renderTimer() {
          const host = root.querySelector('#timerCard');
          const { data: running } = await ctx.api('/time-entries/running');
          if (running) {
            const start = new Date(running.started_at.replace(' ', 'T') + (running.started_at.includes('Z') ? '' : 'Z'));
            const tick = () => {
              const el = host.querySelector('.clock');
              if (!el) return;
              const s = Math.floor((Date.now() - start) / 1000);
              const h = String(Math.floor(s / 3600)).padStart(2, '0');
              const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
              const ss = String(s % 60).padStart(2, '0');
              el.textContent = `${h}:${m}:${ss}`;
            };
            host.innerHTML = `
              <div class="timer-card">
                <div class="clock">00:00:00</div>
                <div class="desc">${ctx.esc(running.description)}</div>
                <div class="actions"><button class="btn" style="background:#fff;color:var(--danger)" id="stopBtn">إيقاف المؤقت</button></div>
              </div>`;
            tick(); const iv = setInterval(tick, 1000);
            host.querySelector('#stopBtn').addEventListener('click', async () => {
              clearInterval(iv);
              try { await ctx.api('/time-entries/stop', { method: 'POST' }); ctx.toast('تم حفظ الإدخال', 'success'); location.reload(); }
              catch (e) { ctx.toast(e.message, 'error'); }
            });
          } else {
            const [{ data: cases }, { data: clients }] = await Promise.all([
              ctx.api('/cases', { params: { limit: 200 } }),
              ctx.api('/clients', { params: { limit: 200 } })
            ]);
            host.innerHTML = `
              <div class="timer-card">
                <form class="start-form" id="startForm" onsubmit="event.preventDefault()">
                  <input name="description" placeholder="وصف العمل..." required>
                  <select name="case_id"><option value="">اختر قضية (اختياري)</option>${cases.map(c => `<option value="${c.id}">${ctx.esc(c.case_number)} - ${ctx.esc(c.title)}</option>`).join('')}</select>
                  <input name="hourly_rate" type="number" step="0.01" placeholder="السعر بالساعة">
                  <button class="btn" style="background:#fff;color:var(--brand)" type="submit">▶ ابدأ</button>
                </form>
              </div>`;
            host.querySelector('#startForm').addEventListener('submit', async (e) => {
              const f = e.target;
              try {
                await ctx.api('/time-entries/start', { method: 'POST', body: {
                  description: f.description.value,
                  case_id: f.case_id.value || null,
                  hourly_rate: f.hourly_rate.value ? parseFloat(f.hourly_rate.value) : null
                }});
                location.reload();
              } catch (err) { ctx.toast(err.message, 'error'); }
            });
          }
        }
        renderTimer();

        CrudPage.render(root.querySelector('#crudHost'), ctx, {
          resource: '/time-entries',
          title: 'الإدخالات',
          addLabel: 'إضافة يدوية',
          stats: async () => {
            const today = new Date().toISOString().slice(0, 10);
            const monthStart = today.slice(0, 7) + '-01';
            const [t, m] = await Promise.all([
              ctx.api('/time-entries/summary', { params: { from: today, to: today } }),
              ctx.api('/time-entries/summary', { params: { from: monthStart } })
            ]);
            return [
              { value: fmtDur(t.data.minutes), label: 'اليوم' },
              { value: fmtDur(m.data.minutes), label: 'هذا الشهر' },
              { value: ctx.fmtMoney(m.data.billable_amount), label: 'قابل للتحصيل (الشهر)' }
            ];
          },
          filters: [
            { key: 'is_billable', type: 'select', label: 'قابل للتحصيل', options: [{ value: '1', label: 'نعم' }, { value: '0', label: 'لا' }] },
            { key: 'is_billed', type: 'select', label: 'مفوتر', options: [{ value: '1', label: 'نعم' }, { value: '0', label: 'لا' }] }
          ],
          columns: [
            { key: 'entry_date', label: 'التاريخ', render: (r) => ctx.fmtDate(r.entry_date) },
            { key: 'description', label: 'الوصف' },
            { key: 'duration_minutes', label: 'المدة', render: (r) => fmtDur(r.duration_minutes) },
            { key: 'hourly_rate', label: 'السعر/س', render: (r) => r.hourly_rate ? ctx.fmtMoney(r.hourly_rate) : '—' },
            { key: 'amount', label: 'المبلغ', render: (r) => r.amount ? ctx.fmtMoney(r.amount) : '—' },
            { key: 'is_billed', label: 'مفوتر', render: (r) => r.is_billed ? '✓' : '' }
          ],
          form: async () => {
            const [{ data: cases }, { data: clients }] = await Promise.all([
              ctx.api('/cases', { params: { limit: 200 } }),
              ctx.api('/clients', { params: { limit: 200 } })
            ]);
            return [
              { key: 'entry_date', label: 'التاريخ', type: 'date', required: true },
              { key: 'duration_minutes', label: 'المدة (دقائق)', type: 'number', required: true },
              { key: 'hourly_rate', label: 'السعر بالساعة', type: 'number' },
              { key: 'currency', label: 'العملة', type: 'text' },
              { key: 'case_id', label: 'القضية', type: 'select',
                options: [{ value: '', label: '--' }, ...cases.map(c => ({ value: c.id, label: `${c.case_number} - ${c.title}` }))] },
              { key: 'client_id', label: 'الموكل', type: 'select',
                options: [{ value: '', label: '--' }, ...clients.map(c => ({ value: c.id, label: `${c.first_name} ${c.last_name}` }))] },
              { key: 'is_billable', label: 'قابل للتحصيل', type: 'select', options: [{ value: '1', label: 'نعم' }, { value: '0', label: 'لا' }] },
              { key: 'description', label: 'الوصف', type: 'textarea', required: true, width: 'full' }
            ];
          }
        });
      }
    });
  </script>
</body>
</html>
