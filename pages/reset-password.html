<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور - ميزان</title>
  <link rel="stylesheet" href="../css/app-shell.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 20px; background: linear-gradient(135deg, var(--brand), var(--brand-hover)); }
    .auth-card { background: #fff; padding: 36px; border-radius: 14px; width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .auth-card h1 { color: var(--brand); margin: 0 0 10px; }
    .msg { padding: 10px 14px; border-radius: 8px; margin: 10px 0; display: none; }
    .msg.show { display: block; }
    .msg.err { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1>إعادة تعيين كلمة المرور</h1>
    <div class="msg err" id="err"></div>
    <form id="f" class="form-grid">
      <div class="form-field full"><label>كلمة المرور الجديدة *</label><input name="password" type="password" required minlength="6"></div>
      <div class="form-field full"><label>تأكيد كلمة المرور *</label><input name="confirm" type="password" required minlength="6"></div>
      <div class="form-field full"><button class="btn btn-primary" type="submit" style="width:100%;padding:12px">تعيين كلمة المرور</button></div>
    </form>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    const form = document.getElementById('f');
    const err = document.getElementById('err');
    function showErr(m) { err.textContent = m; err.classList.add('show'); }
    if (!token) showErr('رابط غير صالح');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.remove('show');
      if (form.password.value !== form.confirm.value) return showErr('كلمتا المرور غير متطابقتين');
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: form.password.value })
        });
        const body = await res.json();
        if (!res.ok || !body.success) return showErr(body.error || 'فشلت العملية');
        alert('تم إعادة تعيين كلمة المرور. سجل دخولك.');
        location.href = 'login.html';
      } catch { showErr('تعذر الاتصال بالخادم'); }
    });
  </script>
</body>
</html>
