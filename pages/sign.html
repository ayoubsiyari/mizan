<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>توقيع العقد - ميزان</title>
  <link rel="stylesheet" href="../css/app-shell.css">
  <style>
    body { background: #f3f4f6; padding: 24px; min-height: 100vh; }
    .wrap { max-width: 860px; margin: 0 auto; }
    .sheet { background: #fff; border-radius: 12px; box-shadow: var(--shadow); padding: 32px; margin-bottom: 16px; }
    .sheet h1 { color: var(--brand); margin: 0 0 4px; }
    .sheet .sub { color: var(--muted); margin: 0 0 20px; }
    pre.content { white-space: pre-wrap; font-family: inherit; line-height: 2; background: #fafafa; border: 1px solid var(--border); border-radius: 8px; padding: 20px; max-height: 500px; overflow-y: auto; }
    .pad-wrap { border: 2px dashed var(--border); border-radius: 10px; padding: 10px; background: #fafafa; }
    canvas#pad { display: block; width: 100%; height: 220px; background: #fff; border-radius: 6px; touch-action: none; cursor: crosshair; }
    .pad-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
    .note { background: #fef3c7; color: #92400e; padding: 12px 16px; border-radius: 8px; }
    .ok  { background: #d1fae5; color: #065f46; padding: 12px 16px; border-radius: 8px; }
    .err { background: #fee2e2; color: #991b1b; padding: 12px 16px; border-radius: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  <div id="status"></div>
  <div class="sheet" id="sheet" style="display:none">
    <h1 id="title"></h1>
    <p class="sub" id="subtitle"></p>
    <h3>نص العقد</h3>
    <pre class="content" id="content"></pre>

    <h3 style="margin-top:28px">التوقيع الإلكتروني</h3>
    <p class="note">بالتوقيع أدناه، تقر بأنك الموقّع المعتمد وأن توقيعك الإلكتروني يُعدّ ملزماً قانونياً.</p>

    <div class="form-field full" style="margin:12px 0">
      <label>الاسم الكامل *</label>
      <input id="signerName" type="text" placeholder="اكتب اسمك الكامل" required>
    </div>

    <div class="pad-wrap">
      <canvas id="pad"></canvas>
      <div class="pad-actions">
        <button class="btn btn-secondary btn-sm" id="clearPad" type="button">مسح</button>
        <span style="color:var(--muted);font-size:.85rem">ارسم توقيعك بالفأرة أو الإصبع</span>
      </div>
    </div>

    <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" id="submitBtn" type="button">تأكيد التوقيع</button>
    </div>
  </div>
</div>
<script>
  const statusEl = document.getElementById('status');
  const sheet = document.getElementById('sheet');
  const token = new URLSearchParams(location.search).get('token');

  function showMsg(kind, html) { statusEl.innerHTML = `<div class="sheet ${kind}">${html}</div>`; }

  if (!token) { showMsg('err', 'رابط غير صالح.'); }

  async function load() {
    try {
      const res = await fetch(`/api/public/contracts/sign/${encodeURIComponent(token)}`);
      const body = await res.json();
      if (!res.ok || !body.success) { showMsg('err', body.error || 'تعذّر تحميل العقد.'); return; }
      const { contract, party, signer_name } = body.data;
      document.getElementById('title').textContent = contract.title;
      document.getElementById('subtitle').textContent = `${contract.firm_name_ar || contract.firm_name || ''} • توقيع ${party === 'client' ? 'الموكل' : 'المكتب'}`;
      document.getElementById('content').textContent = contract.content;
      if (signer_name) document.getElementById('signerName').value = signer_name;
      sheet.style.display = 'block';
    } catch { showMsg('err', 'تعذّر الاتصال بالخادم.'); }
  }
  load();

  // Signature pad
  const canvas = document.getElementById('pad');
  const ctx = canvas.getContext('2d');
  function resize() {
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#111';
  }
  window.addEventListener('resize', resize);
  setTimeout(resize, 100);

  let drawing = false, hasInk = false;
  function pos(e) {
    const rect = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  }
  function start(e) { e.preventDefault(); drawing = true; const { x, y } = pos(e); ctx.beginPath(); ctx.moveTo(x, y); }
  function move(e) { if (!drawing) return; e.preventDefault(); const { x, y } = pos(e); ctx.lineTo(x, y); ctx.stroke(); hasInk = true; }
  function end() { drawing = false; }
  canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); canvas.addEventListener('mouseup', end); canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move); canvas.addEventListener('touchend', end);
  document.getElementById('clearPad').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height); hasInk = false;
  });

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const name = document.getElementById('signerName').value.trim();
    if (!name) return alert('الرجاء إدخال اسمك الكامل.');
    if (!hasInk)  return alert('الرجاء رسم توقيعك.');
    const dataUrl = canvas.toDataURL('image/png');
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'جارٍ الإرسال...';
    try {
      const res = await fetch(`/api/public/contracts/sign/${encodeURIComponent(token)}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ signer_name: name, signature_data_url: dataUrl })
      });
      const body = await res.json();
      if (!res.ok || !body.success) throw new Error(body.error || 'فشل الحفظ');
      sheet.style.display = 'none';
      showMsg('ok', '✅ تم توقيع العقد بنجاح. شكراً لك.');
    } catch (e) {
      btn.disabled = false; btn.textContent = 'تأكيد التوقيع';
      alert(e.message);
    }
  });
</script>
</body>
</html>
