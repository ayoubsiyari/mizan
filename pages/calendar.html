<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التقويم - ميزان</title>
  <link rel="stylesheet" href="../css/app-shell.css">
  <style>
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 128px;   /* fixed row height so cells never grow */
      gap: 4px; background: #e5e7eb; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden;
    }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
      background: #e5e7eb; border: 1px solid #e5e7eb; border-radius: 10px 10px 0 0;
      border-bottom: 0; overflow: hidden;
    }
    .cal-grid { border-radius: 0 0 10px 10px; border-top: 0; }
    .cal-weekday { background: #f9fafb; padding: 10px; text-align: center; font-weight: 700; color: var(--muted); }
    .cal-day {
      background: #fff; padding: 8px; position: relative; cursor: pointer; transition: background .1s;
      overflow: hidden;              /* clip extra events so the cell stays fixed-height */
      display: flex; flex-direction: column; gap: 2px;
    }
    .cal-day:hover { background: #eff6ff; }
    .cal-day.dim { background: #fafafa; color: var(--muted); cursor: default; }
    .cal-day.dim:hover { background: #fafafa; }
    .cal-day .num { font-weight: 700; font-size: .9rem; }
    .cal-day.today .num { color: var(--brand); background: var(--gold); border-radius: 999px; width: 26px; height: 26px; display: grid; place-items: center; }
    .cal-event { color: #fff; padding: 2px 6px; border-radius: 4px; font-size: .75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .cal-event.event    { background: #2563eb; }
    .cal-event.hearing  { background: #9333ea; }
    .cal-event.deadline { background: #dc2626; }
    .cal-event.task     { background: #0ea5e9; }
    .cal-event.more { background: #6b7280; font-weight: 600; }
    .cal-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
    .cal-toolbar h3 { margin: 0 auto; color: var(--brand); }

    /* Day detail modal content */
    .day-section { margin-bottom: 16px; }
    .day-section h4 { margin: 0 0 8px; display: flex; align-items: center; gap: 8px; font-size: .95rem; }
    .day-section h4::before { content: ''; width: 10px; height: 10px; border-radius: 50%; background: var(--c, #6b7280); }
    .day-section.event    { --c: #2563eb; }
    .day-section.hearing  { --c: #9333ea; }
    .day-section.deadline { --c: #dc2626; }
    .day-section.task     { --c: #0ea5e9; }
    .day-row {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
      padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px;
      background: var(--card); border-inline-start: 3px solid var(--c, var(--border));
    }
    .day-row .t { font-weight: 600; color: #374151; flex-shrink: 0; min-width: 56px; }
    .day-row .body { flex: 1; min-width: 0; }
    .day-row .title { font-weight: 600; }
    .day-row .meta { color: var(--muted); font-size: .85rem; margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
    .day-empty { padding: 30px; text-align: center; color: var(--muted); }
    .btn-link { color: var(--brand); text-decoration: none; font-size: .85rem; font-weight: 600; }
    .btn-link:hover { text-decoration: underline; }

    /* Mobile: compact grid with dots instead of full event chips */
    @media (max-width: 640px) {
      .cal-grid { grid-auto-rows: 62px; gap: 2px; }
      .cal-weekdays { gap: 2px; }
      .cal-weekday { padding: 6px 2px; font-size: .7rem; }
      .cal-day { padding: 4px 3px; gap: 0; }
      .cal-day .num { font-size: .8rem; }
      .cal-day.today .num { width: 22px; height: 22px; font-size: .75rem; }
      /* hide text chips on phones, replace with colored dots */
      .cal-event { display: none; }
      .cal-event-dots {
        display: flex; gap: 3px; justify-content: center;
        position: absolute; bottom: 4px; left: 0; right: 0;
      }
      .cal-event-dot { width: 6px; height: 6px; border-radius: 50%; }
      .cal-event-dot.event    { background: #2563eb; }
      .cal-event-dot.hearing  { background: #9333ea; }
      .cal-event-dot.deadline { background: #dc2626; }
      .cal-event-dot.task     { background: #0ea5e9; }
      .cal-toolbar h3 { font-size: 1rem; }
      .day-row { grid-template-columns: auto 1fr; }
    }
    /* Dots container is hidden on desktop */
    .cal-event-dots { display: none; }
  </style>
</head>
<body>
  <script src="../js/app-shell.js"></script>
  <script>
    AppShell.mount({
      page: 'calendar',
      title: 'التقويم',
      render: async (root, ctx) => {
        let current = new Date();
        const WEEKDAYS = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
        const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

        root.innerHTML = `
          <div class="page-header">
            <h2 class="page-title">التقويم</h2>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-secondary" id="printBtn">🖨️ طباعة</button>
              <button class="btn btn-secondary" id="exportBtn">⬇ تصدير</button>
              <button class="btn btn-primary" id="addEvt">+ إضافة حدث</button>
            </div>
          </div>
          <div class="card" id="calHost"></div>`;

        // ---- Helpers ----
        const pad = (n) => String(n).padStart(2, '0');
        const dateKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;          // internal key (ASCII)
        const parseTs = (s) => s ? new Date(s.includes('T') || s.includes('Z') ? s : s.replace(' ', 'T') + 'Z') : null;
        // Latin (Western) digits everywhere for consistency with money.
        const toArDigits = (x) => String(x); // kept as identity alias so call sites stay unchanged
        const timeStr = (d) => d ? d.toLocaleTimeString('ar-SA-u-nu-latn', { hour: '2-digit', minute: '2-digit' }) : '';

        // Cache of current month data so day click can render without re-fetching
        let monthData = { byKey: {}, month: null };

        async function draw() {
          const y = current.getFullYear(), m = current.getMonth();
          const first = new Date(y, m, 1);
          const startDow = first.getDay();
          const daysInMonth = new Date(y, m + 1, 0).getDate();
          const daysInPrev = new Date(y, m, 0).getDate();

          // Month range (local)
          const monthStart = new Date(y, m, 1, 0, 0, 0);
          const monthEnd = new Date(y, m + 1, 0, 23, 59, 59);
          const inMonth = (d) => d && d >= monthStart && d <= monthEnd;

          // Fetch everything in parallel
          const [eventsRes, hearingsRes, deadlinesRes, tasksRes] = await Promise.all([
            ctx.api('/calendar/month', { params: { year: y, month: m + 1 } }).catch(() => ({ data: [] })),
            ctx.api('/hearings', { params: { limit: 500 } }).catch(() => ({ data: [] })),
            ctx.api('/deadlines', { params: { limit: 500 } }).catch(() => ({ data: [] })),
            ctx.api('/tasks', { params: { limit: 500 } }).catch(() => ({ data: [] }))
          ]);

          const byKey = {};
          const push = (key, item) => { (byKey[key] = byKey[key] || []).push(item); };

          (eventsRes.data || []).forEach((ev) => {
            const d = parseTs(ev.start_time); if (!inMonth(d)) return;
            push(dateKey(d), {
              kind: ev.event_type === 'deadline' ? 'deadline' : ev.event_type === 'task' ? 'task' : 'event',
              title: ev.title, time: timeStr(d), location: ev.location, id: ev.id, source: 'calendar'
            });
          });
          const HEARING_TYPE_AR = {
            initial: 'افتتاحية', follow_up: 'متابعة', evidence: 'إثبات',
            judgment: 'نطق بالحكم', other: 'أخرى'
          };
          (hearingsRes.data || []).forEach((h) => {
            const d = parseTs(h.scheduled_at); if (!inMonth(d)) return;
            const typeAr = HEARING_TYPE_AR[h.hearing_type] || h.hearing_type || '';
            push(dateKey(d), {
              kind: 'hearing',
              title: h.title ? `${h.title}${typeAr ? ` (${typeAr})` : ''}` : `جلسة ${typeAr}`.trim(),
              time: timeStr(d), location: h.court_name, status: h.status,
              href: `cases.html?focus=${h.case_id}`, source: 'hearing'
            });
          });
          (deadlinesRes.data || []).forEach((dl) => {
            const d = parseTs(dl.due_at); if (!inMonth(d)) return;
            push(dateKey(d), {
              kind: 'deadline', title: dl.title, time: timeStr(d),
              priority: dl.priority, status: dl.status, id: dl.id,
              href: 'deadlines.html', source: 'deadline'
            });
          });
          (tasksRes.data || []).forEach((t) => {
            if (!t.due_date) return;
            // due_date may be DATE or DATETIME — normalise to local midnight if pure date
            const d = parseTs(t.due_date.length <= 10 ? t.due_date + 'T00:00:00' : t.due_date);
            if (!inMonth(d)) return;
            push(dateKey(d), {
              kind: 'task', title: t.title, time: t.due_date.length <= 10 ? '' : timeStr(d),
              priority: t.priority, status: t.status, id: t.id,
              href: 'tasks.html', source: 'task'
            });
          });

          // Sort each day's list by time (items without time go first)
          Object.values(byKey).forEach(arr => arr.sort((a, b) => (a.time || '').localeCompare(b.time || '')));
          monthData = { byKey, month: { y, m } };

          const cells = [];
          for (let i = 0; i < startDow; i++) {
            const d = daysInPrev - (startDow - i - 1);
            cells.push({ day: d, dim: true });
          }
          for (let i = 1; i <= daysInMonth; i++) cells.push({ day: i, key: `${y}-${pad(m + 1)}-${pad(i)}` });
          while (cells.length % 7 !== 0) cells.push({ day: cells.length - startDow - daysInMonth + 1, dim: true });

          const today = new Date();
          const isToday = (i) => today.getFullYear() === y && today.getMonth() === m && today.getDate() === i;

          const host = root.querySelector('#calHost');
          host.innerHTML = `
            <div class="cal-toolbar">
              <button class="btn btn-secondary btn-sm" id="prevM">◀ السابق</button>
              <button class="btn btn-secondary btn-sm" id="today">اليوم</button>
              <button class="btn btn-secondary btn-sm" id="nextM">التالي ▶</button>
              <h3>${MONTHS[m]} ${toArDigits(y)}</h3>
            </div>
            <div class="cal-weekdays">
              ${WEEKDAYS.map(d => `<div class="cal-weekday">${d}</div>`).join('')}
            </div>
            <div class="cal-grid">
              ${cells.map(c => {
                const list = !c.dim ? (byKey[c.key] || []) : [];
                const previews = list.slice(0, 3).map(ev =>
                  `<div class="cal-event ${ev.kind}" title="${ctx.esc(ev.title)}">${ev.time ? ev.time + ' ' : ''}${ctx.esc(ev.title)}</div>`
                ).join('');
                const more = list.length > 3 ? `<div class="cal-event more">+${toArDigits(list.length - 3)} المزيد</div>` : '';
                // Deduplicated kind dots for the phone view
                const kinds = [...new Set(list.map(e => e.kind))].slice(0, 4);
                const dots = kinds.length
                  ? `<div class="cal-event-dots">${kinds.map(k => `<span class="cal-event-dot ${k}"></span>`).join('')}</div>`
                  : '';
                return `
                  <div class="cal-day ${c.dim ? 'dim' : ''} ${!c.dim && isToday(c.day) ? 'today' : ''}" data-key="${c.key || ''}">
                    <span class="num">${toArDigits(c.day)}</span>
                    ${previews}${more}${dots}
                  </div>`;
              }).join('')}
            </div>`;

          host.querySelector('#prevM').onclick = () => { current = new Date(y, m - 1, 1); draw(); };
          host.querySelector('#nextM').onclick = () => { current = new Date(y, m + 1, 1); draw(); };
          host.querySelector('#today').onclick = () => { current = new Date(); draw(); };

          // Day click -> open detail modal
          host.querySelectorAll('.cal-day:not(.dim)').forEach((cell) => {
            cell.addEventListener('click', () => openDayDetail(cell.dataset.key));
          });
        }

        function openDayDetail(key) {
          if (!key) return;
          const list = monthData.byKey[key] || [];
          const [y, mo, dd] = key.split('-').map(Number);
          const dateObj = new Date(y, mo - 1, dd);
          const humanDate = dateObj.toLocaleDateString('ar-SA-u-nu-latn', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

          const SECTION_ORDER = [
            { kind: 'hearing',  label: 'الجلسات' },
            { kind: 'deadline', label: 'المواعيد النهائية' },
            { kind: 'task',     label: 'المهام' },
            { kind: 'event',    label: 'الأحداث' }
          ];
          const PRIORITY_LABEL = { high: 'عالية', medium: 'متوسطة', low: 'منخفضة', urgent: 'عاجلة' };
          const STATUS_LABEL = { open: 'مفتوح', pending: 'معلقة', completed: 'مكتملة', scheduled: 'مجدولة', in_progress: 'قيد التنفيذ', cancelled: 'ملغاة', missed: 'فائت' };

          let bodyHTML;
          if (!list.length) {
            bodyHTML = `<div class="day-empty">لا توجد أحداث في هذا اليوم</div>`;
          } else {
            bodyHTML = SECTION_ORDER.map(({ kind, label }) => {
              const items = list.filter((i) => i.kind === kind);
              if (!items.length) return '';
              return `
                <div class="day-section ${kind}">
                  <h4>${label} <span style="color:var(--muted);font-weight:400">(${items.length})</span></h4>
                  ${items.map((i) => `
                    <div class="day-row ${kind}">
                      <div class="t">${i.time || '—'}</div>
                      <div class="body">
                        <div class="title">${ctx.esc(i.title)}</div>
                        <div class="meta">
                          ${i.location ? `<span>📍 ${ctx.esc(i.location)}</span>` : ''}
                          ${i.priority ? `<span class="badge ${ctx.esc(i.priority)}">${ctx.esc(PRIORITY_LABEL[i.priority] || i.priority)}</span>` : ''}
                          ${i.status ? `<span class="badge ${ctx.esc(i.status)}">${ctx.esc(STATUS_LABEL[i.status] || i.status)}</span>` : ''}
                          ${i.href ? `<a href="${i.href}" class="btn-link">فتح ←</a>` : ''}
                        </div>
                      </div>
                    </div>`).join('')}
                </div>`;
            }).join('');
          }

          ctx.openModal({
            title: humanDate,
            contentHTML: `<div style="max-height:60vh;overflow:auto">${bodyHTML}</div>
              <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
                <button class="btn btn-primary btn-sm" id="addOnDay">+ إضافة حدث في هذا اليوم</button>
              </div>`,
            okText: 'إغلاق',
            cancelText: null
          });

          setTimeout(() => {
            const btn = document.getElementById('addOnDay');
            if (btn) btn.addEventListener('click', () => {
              // Close current modal and open add-event with date prefill
              document.querySelectorAll('.modal-backdrop,.modal').forEach(el => el.remove());
              openAddEvent({ dateKey: key });
            });
          }, 0);
        }

        async function openAddEvent(options = {}) {
          const [{ data: cases }, { data: clients }] = await Promise.all([
            ctx.api('/cases', { params: { limit: 200 } }),
            ctx.api('/clients', { params: { limit: 200 } })
          ]);
          // Prefill start/end when a day was clicked: 09:00–10:00 local.
          let startDefault = '', endDefault = '';
          if (options.dateKey) {
            startDefault = `${options.dateKey}T09:00`;
            endDefault = `${options.dateKey}T10:00`;
          }
          ctx.openModal({
            title: options.dateKey
              ? `إضافة حدث في ${new Date(options.dateKey).toLocaleDateString('ar-SA-u-nu-latn', { year: 'numeric', month: 'long', day: 'numeric' })}`
              : 'إضافة حدث',
            contentHTML: `
              <form id="evtForm" class="form-grid" onsubmit="event.preventDefault()">
                <div class="form-field full"><label>العنوان *</label><input name="title" required></div>
                <div class="form-field"><label>النوع *</label>
                  <select name="event_type" required>
                    <option value="meeting">اجتماع</option>
                    <option value="deadline">موعد نهائي</option>
                    <option value="reminder">تذكير</option>
                    <option value="task">مهمة</option>
                    <option value="other">أخرى</option>
                  </select>
                </div>
                <div class="form-field"><label>البدء *</label><input name="start_time" type="datetime-local" value="${startDefault}" required></div>
                <div class="form-field"><label>الانتهاء *</label><input name="end_time" type="datetime-local" value="${endDefault}" required></div>
                <div class="form-field"><label>المكان</label><input name="location"></div>
                <div class="form-field"><label>القضية</label>
                  <select name="case_id"><option value="">--</option>${cases.map(c => `<option value="${c.id}">${c.case_number} - ${c.title}</option>`).join('')}</select>
                </div>
                <div class="form-field"><label>الموكل</label>
                  <select name="client_id"><option value="">--</option>${clients.map(c => `<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('')}</select>
                </div>
                <div class="form-field full"><label>الوصف</label><textarea name="description"></textarea></div>
              </form>`,
            onOk: async (body) => {
              const f = body.querySelector('#evtForm');
              const payload = {
                title: f.title.value,
                event_type: f.event_type.value,
                start_time: new Date(f.start_time.value).toISOString(),
                end_time: new Date(f.end_time.value).toISOString(),
                location: f.location.value || null,
                case_id: f.case_id.value || null,
                client_id: f.client_id.value || null,
                description: f.description.value || null
              };
              try { await ctx.api('/calendar', { method: 'POST', body: payload }); ctx.toast('تمت الإضافة', 'success'); draw(); return true; }
              catch (e) { ctx.toast(e.message, 'error'); return false; }
            }
          });
        }

        root.querySelector('#addEvt').addEventListener('click', () => openAddEvent());
        root.querySelector('#exportBtn').addEventListener('click', () => openExportModal());
        root.querySelector('#printBtn').addEventListener('click', () => openPrintModal());

        // ---- Quick direct-print (no download): pick range, open printable view,
        //      auto-fires the browser print dialog. ----
        function openPrintModal() {
          // Default to the currently visible month in the calendar.
          const y = current.getFullYear(), m = current.getMonth();
          const first = new Date(y, m, 1);
          const last  = new Date(y, m + 1, 0);
          ctx.openModal({
            title: 'طباعة التقويم',
            contentHTML: `
              <form id="prtForm" class="form-grid" onsubmit="event.preventDefault()">
                <div class="form-field"><label>من تاريخ</label><input type="date" name="from" value="${dateKey(first)}" required></div>
                <div class="form-field"><label>إلى تاريخ</label><input type="date" name="to"   value="${dateKey(last)}"  required></div>
                <div class="form-field full"><label>تضمين</label>
                  <div style="display:flex;gap:14px;flex-wrap:wrap;padding-top:4px">
                    <label style="font-weight:400"><input type="checkbox" name="inc_hearing"  checked> الجلسات</label>
                    <label style="font-weight:400"><input type="checkbox" name="inc_deadline" checked> المواعيد النهائية</label>
                    <label style="font-weight:400"><input type="checkbox" name="inc_task"     checked> المهام</label>
                    <label style="font-weight:400"><input type="checkbox" name="inc_event"    checked> الأحداث</label>
                  </div>
                </div>
              </form>`,
            okText: '🖨️ طباعة الآن',
            onOk: async (body) => {
              const f = body.querySelector('#prtForm');
              const fromStr = f.from.value, toStr = f.to.value;
              if (!fromStr || !toStr) { ctx.toast('حدد الفترة', 'error'); return false; }
              const from = new Date(fromStr + 'T00:00:00');
              const to   = new Date(toStr + 'T23:59:59');
              if (to < from) { ctx.toast('تاريخ النهاية قبل البداية', 'error'); return false; }
              const kinds = {
                hearing: f.inc_hearing.checked, deadline: f.inc_deadline.checked,
                task: f.inc_task.checked, event: f.inc_event.checked
              };
              try {
                const items = await collectRange(from, to, kinds);
                if (!items.length) { ctx.toast('لا توجد بيانات في هذا النطاق', 'warning'); return false; }
                // Reuse the same report renderer but without the download/save path.
                const html = renderReportHTML(items, fromStr, toStr);
                const w = window.open('', '_blank');
                if (!w) { ctx.toast('يرجى السماح بالنوافذ المنبثقة للطباعة', 'error', 5000); return false; }
                w.document.open(); w.document.write(html); w.document.close();
                w.addEventListener('load', () => setTimeout(() => w.print(), 300));
                return true;
              } catch (err) { ctx.toast(err.message, 'error'); return false; }
            }
          });
        }

        // ---- Export: lets user pick a date range and format, then downloads ----
        function openExportModal() {
          const today = new Date();
          const first = new Date(today.getFullYear(), today.getMonth(), 1);
          const last = new Date(today.getFullYear(), today.getMonth() + 1, 0);
          const fromDefault = dateKey(first);
          const toDefault = dateKey(last);

          ctx.openModal({
            title: 'تصدير التقويم',
            contentHTML: `
              <form id="expForm" class="form-grid" onsubmit="event.preventDefault()">
                <div class="form-field"><label>من تاريخ</label><input type="date" name="from" value="${fromDefault}" required></div>
                <div class="form-field"><label>إلى تاريخ</label><input type="date" name="to" value="${toDefault}" required></div>
                <div class="form-field full"><label>تضمين</label>
                  <div style="display:flex;gap:14px;flex-wrap:wrap;padding-top:4px">
                    <label style="font-weight:400"><input type="checkbox" name="inc_hearing"  checked> الجلسات</label>
                    <label style="font-weight:400"><input type="checkbox" name="inc_deadline" checked> المواعيد النهائية</label>
                    <label style="font-weight:400"><input type="checkbox" name="inc_task"     checked> المهام</label>
                    <label style="font-weight:400"><input type="checkbox" name="inc_event"    checked> الأحداث</label>
                  </div>
                </div>
                <div class="form-field full"><label>الصيغة</label>
                  <select name="format">
                    <option value="pdf">PDF (مناسب للطباعة)</option>
                    <option value="csv">CSV (Excel)</option>
                    <option value="doc">Word (.doc)</option>
                    <option value="ics">ICS (تقويم جوجل / آيفون)</option>
                    <option value="json">JSON</option>
                  </select>
                </div>
              </form>`,
            okText: 'تنزيل',
            onOk: async (body) => {
              const f = body.querySelector('#expForm');
              const fromStr = f.from.value, toStr = f.to.value;
              if (!fromStr || !toStr) { ctx.toast('حدد تاريخ البداية والنهاية', 'error'); return false; }
              const from = new Date(fromStr + 'T00:00:00');
              const to = new Date(toStr + 'T23:59:59');
              if (to < from) { ctx.toast('تاريخ النهاية قبل البداية', 'error'); return false; }

              const kinds = {
                hearing: f.inc_hearing.checked, deadline: f.inc_deadline.checked,
                task: f.inc_task.checked, event: f.inc_event.checked
              };
              try {
                const items = await collectRange(from, to, kinds);
                if (!items.length) { ctx.toast('لا توجد بيانات في هذا النطاق', 'warning'); return false; }
                const fmt = f.format.value;
                if (fmt === 'csv')      downloadCSV(items, fromStr, toStr);
                else if (fmt === 'ics') downloadICS(items, fromStr, toStr);
                else if (fmt === 'pdf') downloadPDF(items, fromStr, toStr);
                else if (fmt === 'doc') downloadDOC(items, fromStr, toStr);
                else                    downloadJSON(items, fromStr, toStr);
                ctx.toast(`تم التصدير (${items.length} عنصر)`, 'success');
                return true;
              } catch (err) { ctx.toast(err.message, 'error'); return false; }
            }
          });
        }

        async function collectRange(from, to, kinds) {
          // Fetch lists only for selected kinds.
          const hearingsP  = kinds.hearing  ? ctx.api('/hearings',  { params: { limit: 2000 } }).catch(() => ({ data: [] })) : { data: [] };
          const deadlinesP = kinds.deadline ? ctx.api('/deadlines', { params: { limit: 2000 } }).catch(() => ({ data: [] })) : { data: [] };
          const tasksP     = kinds.task     ? ctx.api('/tasks',     { params: { limit: 2000 } }).catch(() => ({ data: [] })) : { data: [] };
          const eventsP = kinds.event ? fetchEventsRange(from, to) : Promise.resolve([]);
          // Always fetch clients + cases so we can resolve "اسم الموكل" for each item.
          const clientsP = ctx.api('/clients', { params: { limit: 5000 } }).catch(() => ({ data: [] }));
          const casesP   = ctx.api('/cases',   { params: { limit: 5000 } }).catch(() => ({ data: [] }));
          const [hearingsR, deadlinesR, tasksR, eventsR, clientsR, casesR] = await Promise.all(
            [hearingsP, deadlinesP, tasksP, eventsP, clientsP, casesP]
          );

          // Build lookup maps.
          const clientMap = new Map();
          (clientsR.data || []).forEach((c) => {
            const name = [c.first_name, c.last_name].filter(Boolean).join(' ').trim() || c.name || c.email || '';
            clientMap.set(c.id, name);
          });
          // cases: id -> { client_id, case_number, title }
          const caseMap = new Map();
          (casesR.data || []).forEach((c) => {
            caseMap.set(c.id, {
              client_id: c.client_id,
              case_number: c.case_number || '',
              case_title: c.title || ''
            });
          });
          // Resolve a client name from either client_id or case_id.
          function resolveClient(row) {
            if (row.client_id && clientMap.has(row.client_id)) return clientMap.get(row.client_id);
            if (row.case_id && caseMap.has(row.case_id)) {
              const cs = caseMap.get(row.case_id);
              if (cs.client_id && clientMap.has(cs.client_id)) return clientMap.get(cs.client_id);
            }
            return '';
          }
          function resolveCase(row) {
            if (row.case_id && caseMap.has(row.case_id)) {
              const cs = caseMap.get(row.case_id);
              return cs.case_number ? `${cs.case_number} — ${cs.case_title}`.trim() : cs.case_title || '';
            }
            return '';
          }

          const inRange = (d) => d && d >= from && d <= to;
          const HEARING_TYPE_AR = { initial: 'افتتاحية', follow_up: 'متابعة', evidence: 'إثبات', judgment: 'نطق بالحكم', other: 'أخرى' };
          const STATUS_AR = {
            scheduled: 'مجدولة', in_progress: 'قيد التنفيذ', completed: 'مكتملة',
            cancelled: 'ملغاة', postponed: 'مؤجلة', pending: 'معلقة',
            open: 'مفتوح', missed: 'فائت', draft: 'مسودة', sent: 'مُرسلة',
            paid: 'مدفوعة', overdue: 'متأخرة', active: 'نشطة', closed: 'مغلقة',
            archived: 'مؤرشفة', suspended: 'موقوفة',
            waiting: 'بانتظار', in_meeting: 'في اجتماع', done: 'منتهي', no_show: 'لم يحضر',
            pending_signature: 'بانتظار التوقيع', signed: 'موقّع',
            expired: 'منتهي الصلاحية', terminated: 'مُنهى', template: 'قالب'
          };
          const PRIORITY_AR = { low: 'منخفضة', medium: 'متوسطة', high: 'عالية', urgent: 'عاجلة' };
          const trStatus   = (s) => s ? (STATUS_AR[s]   || s) : '';
          const trPriority = (p) => p ? (PRIORITY_AR[p] || p) : '';
          const out = [];

          const EVENT_TYPE_AR = { meeting: 'اجتماع', deadline: 'موعد نهائي', reminder: 'تذكير', task: 'مهمة', other: 'حدث' };

          (hearingsR.data || []).forEach((h) => {
            const d = parseTs(h.scheduled_at); if (!inRange(d)) return;
            const typeAr = HEARING_TYPE_AR[h.hearing_type] || h.hearing_type || '';
            out.push({
              kind: 'hearing', kindLabel: 'جلسة',
              title: h.title || `جلسة ${typeAr}`.trim(),
              start: d, end: d, allDay: false,
              type: typeAr, status: trStatus(h.status), location: h.court_name || '',
              description: h.description || '', id: h.id,
              client: resolveClient(h), caseRef: resolveCase(h)
            });
          });
          (deadlinesR.data || []).forEach((dl) => {
            const d = parseTs(dl.due_at); if (!inRange(d)) return;
            out.push({
              kind: 'deadline', kindLabel: 'موعد نهائي',
              title: dl.title, start: d, end: d, allDay: false,
              type: '', status: trStatus(dl.status), location: '', priority: trPriority(dl.priority),
              description: dl.description || '', id: dl.id,
              client: resolveClient(dl), caseRef: resolveCase(dl)
            });
          });
          (tasksR.data || []).forEach((t) => {
            if (!t.due_date) return;
            const d = parseTs(t.due_date.length <= 10 ? t.due_date + 'T00:00:00' : t.due_date);
            if (!inRange(d)) return;
            out.push({
              kind: 'task', kindLabel: 'مهمة',
              title: t.title, start: d, end: d, allDay: t.due_date.length <= 10,
              type: '', status: trStatus(t.status), location: '', priority: trPriority(t.priority),
              description: t.description || '', id: t.id,
              client: resolveClient(t), caseRef: resolveCase(t)
            });
          });
          (eventsR || []).forEach((ev) => {
            const d = parseTs(ev.start_time); if (!inRange(d)) return;
            const e = parseTs(ev.end_time) || d;
            const typeAr = EVENT_TYPE_AR[ev.event_type] || ev.event_type || 'حدث';
            out.push({
              kind: 'event', kindLabel: typeAr,
              title: ev.title, start: d, end: e, allDay: false,
              type: typeAr, status: trStatus(ev.status), location: ev.location || '',
              description: ev.description || '', id: ev.id,
              client: resolveClient(ev), caseRef: resolveCase(ev)
            });
          });

          out.sort((a, b) => a.start - b.start);
          return out;
        }

        async function fetchEventsRange(from, to) {
          const months = [];
          const cur = new Date(from.getFullYear(), from.getMonth(), 1);
          while (cur <= to) {
            months.push({ year: cur.getFullYear(), month: cur.getMonth() + 1 });
            cur.setMonth(cur.getMonth() + 1);
          }
          const results = await Promise.all(months.map(({ year, month }) =>
            ctx.api('/calendar/month', { params: { year, month } }).catch(() => ({ data: [] }))
          ));
          return results.flatMap(r => r.data || []);
        }

        // ---- Download helpers ----
        function triggerDownload(filename, content, mime) {
          // Prepend UTF-8 BOM for CSV so Excel opens Arabic correctly.
          const blob = new Blob([content], { type: mime + ';charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = filename;
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 500);
        }
        function csvEscape(v) {
          if (v == null) return '';
          const s = String(v).replace(/"/g, '""');
          return /[",\n\r]/.test(s) ? `"${s}"` : s;
        }
        function fmtLocal(d) {
          return d ? d.toLocaleString('ar-SA-u-nu-latn', { dateStyle: 'short', timeStyle: 'short' }) : '';
        }
        function downloadCSV(items, from, to) {
          const header = ['النوع','العنوان','اسم الموكل','القضية','تاريخ البداية','تاريخ النهاية','يوم كامل','الفئة','الحالة','الأولوية','المكان','الوصف'];
          const lines = [header.join(',')];
          items.forEach((i) => {
            lines.push([
              i.kindLabel, i.title, i.client || '', i.caseRef || '',
              fmtLocal(i.start), fmtLocal(i.end),
              i.allDay ? 'نعم' : 'لا', i.type || '', i.status || '', i.priority || '',
              i.location || '', i.description || ''
            ].map(csvEscape).join(','));
          });
          // UTF-8 BOM so Excel detects encoding.
          triggerDownload(`mizan-calendar-${from}_${to}.csv`, '\uFEFF' + lines.join('\r\n'), 'text/csv');
        }

        // ---- Shared HTML renderer for PDF + Word ----
        function escHtml(s) {
          return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
          }[c]));
        }
        function renderReportHTML(items, from, to) {
          const fromHuman = new Date(from).toLocaleDateString('ar-SA-u-nu-latn', { year: 'numeric', month: 'long', day: 'numeric' });
          const toHuman   = new Date(to).toLocaleDateString('ar-SA-u-nu-latn',   { year: 'numeric', month: 'long', day: 'numeric' });
          const generated = new Date().toLocaleString('ar-SA-u-nu-latn', { dateStyle: 'short', timeStyle: 'short' });

          const rows = items.map((i, idx) => `
            <tr>
              <td>${idx + 1}</td>
              <td>${escHtml(i.kindLabel)}</td>
              <td>${escHtml(i.title)}</td>
              <td>${escHtml(i.client || '—')}</td>
              <td>${escHtml(i.caseRef || '—')}</td>
              <td>${escHtml(fmtLocal(i.start))}</td>
              <td>${escHtml(i.location || '—')}</td>
              <td>${escHtml(i.status || '—')}</td>
            </tr>`).join('');

          return `<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>تقرير التقويم ${from} إلى ${to}</title>
<style>
  @page { size: A4; margin: 15mm; }
  body { font-family: 'Tajawal', Arial, sans-serif; color: #111827; direction: rtl; }
  h1 { color: #1a472a; margin: 0 0 4px; font-size: 20pt; }
  .sub { color: #6b7280; margin: 0 0 14pt; font-size: 10pt; }
  table { width: 100%; border-collapse: collapse; font-size: 10pt; }
  th, td { border: 1px solid #d1d5db; padding: 6pt 8pt; text-align: right; vertical-align: top; }
  th { background: #f3f4f6; font-weight: 700; color: #374151; }
  tr:nth-child(even) td { background: #fafafa; }
  .summary { margin: 10pt 0 14pt; padding: 8pt 12pt; background: #f9fafb; border-inline-start: 4px solid #d4af37; font-size: 10pt; }
  .summary strong { color: #1a472a; }
  .footer { margin-top: 14pt; text-align: center; color: #6b7280; font-size: 8.5pt; }
  @media print { .btn-print { display: none !important; } }
  .btn-print {
    position: fixed; top: 12px; left: 12px;
    padding: 8px 16px; background: #1a472a; color: #fff;
    border: none; border-radius: 6px; cursor: pointer; font-family: inherit;
  }
</style>
</head>
<body>
  <button class="btn-print" onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
  <h1>تقرير التقويم — ميزان</h1>
  <p class="sub">
    الفترة: من ${fromHuman} إلى ${toHuman}
    &nbsp;•&nbsp; تاريخ التوليد: ${generated}
  </p>
  <div class="summary">
    <strong>الإجمالي:</strong> ${items.length} عنصر
    &nbsp;•&nbsp; الجلسات: ${items.filter(i => i.kind === 'hearing').length}
    &nbsp;•&nbsp; المواعيد: ${items.filter(i => i.kind === 'deadline').length}
    &nbsp;•&nbsp; المهام: ${items.filter(i => i.kind === 'task').length}
    &nbsp;•&nbsp; الأحداث: ${items.filter(i => i.kind === 'event').length}
  </div>
  <table>
    <thead>
      <tr>
        <th style="width:4%">#</th>
        <th style="width:9%">النوع</th>
        <th style="width:22%">العنوان</th>
        <th style="width:14%">اسم الموكل</th>
        <th style="width:16%">القضية</th>
        <th style="width:13%">الموعد</th>
        <th style="width:12%">المكان</th>
        <th style="width:10%">الحالة</th>
      </tr>
    </thead>
    <tbody>${rows || '<tr><td colspan="8" style="text-align:center;color:#6b7280">لا توجد بيانات</td></tr>'}</tbody>
  </table>
  <p class="footer">تم التوليد بواسطة نظام ميزان لإدارة المكاتب القانونية</p>
</body>
</html>`;
        }

        // Open the report in a new tab and auto-invoke the print dialog, so the
        // user can "Save as PDF" from any modern browser without extra libraries.
        function downloadPDF(items, from, to) {
          const html = renderReportHTML(items, from, to);
          const w = window.open('', '_blank');
          if (!w) {
            // Popup blocked — fall back to downloading the HTML file.
            triggerDownload(`mizan-calendar-${from}_${to}.html`, html, 'text/html');
            ctx.toast('السماح بالنوافذ المنبثقة مطلوب للطباعة — تم تنزيل ملف HTML بدلاً من ذلك', 'warning', 5000);
            return;
          }
          w.document.open(); w.document.write(html); w.document.close();
          // Auto-open print dialog once loaded (user picks "Save as PDF").
          w.addEventListener('load', () => setTimeout(() => w.print(), 300));
        }

        // Word opens HTML files with .doc extension natively and preserves RTL,
        // tables and Arabic text — no external library needed.
        function downloadDOC(items, from, to) {
          const body = renderReportHTML(items, from, to)
            // Remove the print button from the Word version.
            .replace(/<button class="btn-print"[\s\S]*?<\/button>\s*/, '');
          // Wrap with Word-friendly MHTML header hints.
          const doc = `<!doctype html><html xmlns:o="urn:schemas-microsoft-com:office:office"
            xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
            ${body.substring(body.indexOf('<head>'))}
            </html>`;
          triggerDownload(`mizan-calendar-${from}_${to}.doc`, doc, 'application/msword');
        }
        function downloadJSON(items, from, to) {
          const payload = items.map((i) => ({
            ...i,
            start: i.start.toISOString(),
            end: i.end.toISOString()
          }));
          triggerDownload(`mizan-calendar-${from}_${to}.json`, JSON.stringify(payload, null, 2), 'application/json');
        }
        function downloadICS(items, from, to) {
          // Minimal RFC 5545 VCALENDAR. Uses UTC times (Z).
          const icsDate = (d, allDay) => allDay
            ? d.toISOString().slice(0, 10).replace(/-/g, '')
            : d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
          const fold = (line) => line.match(/.{1,74}/g).join('\r\n ');
          const esc = (s) => String(s || '').replace(/([,;\\])/g, '\\$1').replace(/\n/g, '\\n');
          const now = icsDate(new Date(), false);

          const lines = [
            'BEGIN:VCALENDAR',
            'VERSION:2.0',
            'PRODID:-//Mizan Law//Calendar Export//AR',
            'CALSCALE:GREGORIAN',
          ];
          items.forEach((i, idx) => {
            const uid = `${i.kind}-${i.id || idx}-${Date.now()}@mizan-law`;
            const startProp = i.allDay
              ? `DTSTART;VALUE=DATE:${icsDate(i.start, true)}`
              : `DTSTART:${icsDate(i.start, false)}`;
            // For non-all-day single-point items (deadline/task), set end = start.
            const endDate = i.end && i.end > i.start ? i.end : i.start;
            const endProp = i.allDay
              ? `DTEND;VALUE=DATE:${icsDate(new Date(endDate.getTime() + 86400000), true)}`
              : `DTEND:${icsDate(endDate, false)}`;
            // Build a rich description: client + case + original description (if any).
            const descParts = [];
            if (i.client)      descParts.push(`الموكل: ${i.client}`);
            if (i.caseRef)     descParts.push(`القضية: ${i.caseRef}`);
            if (i.description) descParts.push(i.description);
            const desc = descParts.join('\n');
            lines.push(
              'BEGIN:VEVENT',
              `UID:${uid}`,
              `DTSTAMP:${now}`,
              startProp,
              endProp,
              fold(`SUMMARY:${esc('[' + i.kindLabel + '] ' + i.title + (i.client ? ' — ' + i.client : ''))}`),
              i.location ? fold(`LOCATION:${esc(i.location)}`) : null,
              desc       ? fold(`DESCRIPTION:${esc(desc)}`)    : null,
              'END:VEVENT'
            );
          });
          lines.push('END:VCALENDAR');
          const content = lines.filter(Boolean).join('\r\n');
          triggerDownload(`mizan-calendar-${from}_${to}.ics`, content, 'text/calendar');
        }

        draw();
      }
    });
  </script>
</body>
</html>
